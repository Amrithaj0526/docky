version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install dependencies"
    command: |
      echo "Installing dependencies..."
      npm install

  - type: Command
    name: "Build Step"
    command: |
      echo "Building project..."
      npm run build || echo "No build script"

  - type: Command
    name: "Test Step"
    command: |
      echo "Running tests..."
      npm test || echo "No tests defined"

outputArtifacts:
  - name: build_output
    type: BINARY
    location: .
